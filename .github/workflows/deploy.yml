name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main  # Déclenche le déploiement lors d'un push ou merge sur main

env:
  PROJECT_ID: rim-app-test
  REGION: europe-west3
  SERVICE_NAME: rim-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          # On définit l'URL de l'image de façon propre
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/rim-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          # Étape de Build
          docker build -t $IMAGE_TAG .
          
          # Étape de Push
          docker push $IMAGE_TAG

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/rim-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated