version: '2.0'
name: Default
description: Default RIM schema for the ODT New Space Program (Orbital Dynamics Technologies)
entities:
  risk:
    neo4j_label: Risk
    levels:
    - id: business
      label: Business
      description: Consequence-oriented risks managed by program leadership
      color: '#9b59b6'
      shape: diamond
      emoji: ◆
      size: 35
    - id: operational
      label: Operational
      description: Cause-oriented risks managed by functional teams
      color: '#3498db'
      shape: dot
      emoji: ●
      size: 30
    categories:
    - id: programme
      label: Programme
      description: Program-level risks
      color: '#9b59b6'
    - id: product
      label: Product
      description: Product-related risks
      color: '#3498db'
    - id: industrial
      label: Industrial
      description: Industrial/manufacturing risks
      color: '#27ae60'
    - id: supply_chain
      label: Supply Chain
      description: Supply chain and logistics risks
      color: '#e74c3c'
    statuses:
    - id: active
      label: Active
      description: Currently active risks
      is_active: true
    - id: contingent
      label: Contingent
      description: Potential risks awaiting activation
      is_active: true
    - id: archived
      label: Archived
      description: Closed or inactive risks
      is_active: false
    origins:
    - id: new
      label: New
      description: Newly identified risks
    - id: legacy
      label: Legacy
      description: Inherited or historical risks
    attributes:
    - name: name
      type: string
      required: true
      default: null
      description: Risk name
    - name: description
      type: string
      required: false
      default: null
      description: Risk description
    - name: owner
      type: string
      required: false
      default: null
      description: Risk owner
    - name: probability
      type: float
      required: false
      default: null
      description: Likelihood rating (1-10)
    - name: impact
      type: float
      required: false
      default: null
      description: Impact rating (1-10)
    - name: activation_condition
      type: string
      required: false
      default: null
      description: Condition for contingent risk activation
    - name: activation_decision_date
      type: date
      required: false
      default: null
      description: Decision date for contingent risks
    custom_attributes: []
    subtypes:
    - id: generic
      label: Generic
      applies_to:
      - business
      - operational
      extension_fields: []
    - id: cyber_entry_point
      label: Cyber — Entry Point-Oriented
      applies_to:
      - operational
      extension_fields:
      - name: entry_point_type
        type: enum
        required: false
        description: Type of entry point being exploited
        values:
        - Network
        - Physical
        - Human
        - Supply Chain
        - Cloud
      - name: exploitation_technique
        type: string
        required: false
        description: Technique or vector used
      - name: detection_difficulty
        type: enum
        required: false
        description: How difficult this attack vector is to detect
        values:
        - Low
        - Medium
        - High
        - Very High
    - id: cyber_target_oriented
      label: Cyber — Target-Oriented
      applies_to:
      - operational
      extension_fields:
      - name: target_type
        type: enum
        required: false
        description: Nature of the targeted asset
        values:
        - Functional Target
        - Technical Target
        - Data Asset
        - Personnel
      - name: threat_actor_category
        type: string
        required: false
        description: Category of threat actor
      - name: attack_objective
        type: string
        required: false
        description: Attacker's primary objective
    - id: supply_chain
      label: Supply Chain / Industrial
      applies_to:
      - operational
      extension_fields:
      - name: supplier_tier
        type: enum
        required: false
        description: Supplier tier in the supply chain
        values:
        - Tier 1
        - Tier 2
        - Tier 3
        - Internal
      - name: criticality_class
        type: enum
        required: false
        description: Criticality classification of the supplier
        values:
        - Critical
        - Important
        - Standard
      - name: single_source
        type: boolean
        required: false
        description: Whether this is a single-source dependency
    - id: engineering_technical
      label: Engineering / Technical
      applies_to:
      - operational
      extension_fields:
      - name: affected_subsystem
        type: string
        required: false
        description: Subsystem or component affected
      - name: qualification_stage
        type: enum
        required: false
        description: Programme stage at which the risk materialises
        values:
        - Design
        - Prototype
        - Test
        - Qualification
        - Production
      - name: failure_mode
        type: string
        required: false
        description: Primary failure mode description
    - id: programme_schedule
      label: Programme / Schedule
      applies_to:
      - business
      - operational
      extension_fields:
      - name: milestone_impacted
        type: string
        required: false
        description: Key milestone at risk
      - name: schedule_buffer_weeks
        type: integer
        required: false
        description: Available schedule buffer in weeks
      - name: workstream
        type: string
        required: false
        description: Affected workstream or work package
    - id: regulatory_compliance
      label: Regulatory / Compliance
      applies_to:
      - business
      - operational
      extension_fields:
      - name: regulatory_body
        type: string
        required: false
        description: Relevant regulatory authority
      - name: applicable_standard
        type: string
        required: false
        description: Standard or regulation reference
      - name: licence_stage
        type: string
        required: false
        description: Current licensing stage
    - id: financial_contractual
      label: Financial / Contractual
      applies_to:
      - business
      - operational
      extension_fields:
      - name: contract_type
        type: enum
        required: false
        description: Type of contract involved
        values:
        - Fixed Price
        - T&M
        - Framework
        - Joint Venture
      - name: penalty_clause
        type: boolean
        required: false
        description: Whether a penalty clause applies
      - name: financial_ceiling_meur
        type: float
        required: false
        description: Financial ceiling in M€
    - id: strategic
      label: Strategic
      applies_to:
      - business
      extension_fields:
      - name: strategic_horizon
        type: enum
        required: false
        description: Time horizon of the strategic risk
        values:
        - Short-term (<1yr)
        - Medium-term (1-3yr)
        - Long-term (>3yr)
      - name: competitive_dimension
        type: string
        required: false
        description: Competitive dimension affected
  tpo:
    neo4j_label: TPO
    clusters:
    - id: product_efficiency
      label: Product Efficiency
      description: Product performance objectives
      color: '#f1c40f'
    - id: business_efficiency
      label: Business Efficiency
      description: Business performance objectives
      color: '#f39c12'
    - id: industrial_efficiency
      label: Industrial Efficiency
      description: Manufacturing performance objectives
      color: '#e67e22'
    - id: sustainability
      label: Sustainability
      description: Environmental objectives
      color: '#27ae60'
    - id: safety
      label: Safety
      description: Safety objectives
      color: '#e74c3c'
    attributes:
    - name: reference
      type: string
      required: true
      default: null
      description: TPO reference code
    - name: name
      type: string
      required: true
      default: null
      description: TPO name
    - name: description
      type: string
      required: false
      default: null
      description: TPO description
    custom_attributes: []
  mitigation:
    neo4j_label: Mitigation
    types:
    - id: dedicated
      label: Dedicated
      description: Program-specific mitigations
      color: '#27ae60'
      line_style: solid
    - id: inherited
      label: Inherited
      description: Mitigations from other sources
      color: '#3498db'
      line_style: dotted
    - id: baseline
      label: Baseline
      description: Standard or regulatory mitigations
      color: '#9b59b6'
      line_style: thick
    statuses:
    - id: proposed
      label: Proposed
      description: Planned mitigations
      is_active: true
    - id: in_progress
      label: In Progress
      description: Mitigations being implemented
      is_active: true
    - id: implemented
      label: Implemented
      description: Active mitigations
      is_active: true
    - id: deferred
      label: Deferred
      description: On-hold mitigations
      is_active: false
    attributes:
    - name: name
      type: string
      required: true
      default: null
      description: Mitigation name
    - name: description
      type: string
      required: false
      default: null
      description: Mitigation description
    - name: owner
      type: string
      required: false
      default: null
      description: Mitigation owner
    - name: source_entity
      type: string
      required: false
      default: null
      description: Source entity for inherited mitigations
    - name: capex
      type: float
      required: false
      default: null
      description: Capital Expenditure (CAPEX)
    - name: opex
      type: float
      required: false
      default: null
      description: Operational Expenditure (OPEX)
    custom_attributes: []
relationships:
  influences:
    neo4j_type: INFLUENCES
    default_confidence: 0.8
    types:
    - id: level1_op_to_bus
      label: Level1_Op_to_Bus
      description: Operational to Business influence
      color: '#e74c3c'
      line_style: solid
    - id: level2_bus_to_bus
      label: Level2_Bus_to_Bus
      description: Business to Business influence
      color: '#9b59b6'
      line_style: solid
    - id: level3_op_to_op
      label: Level3_Op_to_Op
      description: Operational to Operational influence
      color: '#3498db'
      line_style: dashed
    strengths:
    - id: weak
      label: Weak
      value: 0.25
      description: Possible minor contribution
      color: '#bdc3c7'
    - id: moderate
      label: Moderate
      value: 0.5
      description: Likely contributes
      color: '#f39c12'
    - id: strong
      label: Strong
      value: 0.75
      description: High probability of propagation
      color: '#e67e22'
    - id: critical
      label: Critical
      value: 1.0
      description: Direct, inevitable causation
      color: '#e74c3c'
  impacts_tpo:
    neo4j_type: IMPACTS_TPO
    impact_levels: []
  mitigates:
    neo4j_type: MITIGATES
    effectiveness_levels:
    - id: low
      label: Low
      reduction: 0.3
      description: Minor risk reduction
    - id: medium
      label: Medium
      reduction: 0.5
      description: Moderate risk reduction
    - id: high
      label: High
      reduction: 0.7
      description: Significant risk reduction
    - id: critical
      label: Critical
      reduction: 0.9
      description: Near-complete risk elimination
analysis:
  exposure:
    base_formula: likelihood * impact
    max_base_value: 100.0
    propagation_decay: 0.85
    convergence_multiplier: 0.2
  cache_timeout_seconds: 30
  max_influence_depth: 10
  high_exposure_threshold_multiplier: 1.2
ui:
  app_title: Risk Influence Map (RIM)
  app_icon: 🎯
  layout: wide
  graph_height: 700px
  graph_bgcolor: '#ffffff'
  tabs:
  - id: visualization
    label: Visualization
    icon: 📊
    enabled: true
  - id: risks
    label: Risks
    icon: 🎯
    enabled: true
  - id: tpos
    label: TPOs
    icon: 🏆
    enabled: true
  - id: mitigations
    label: Mitigations
    icon: 🛡️
    enabled: true
  - id: influences
    label: Influences
    icon: 🔗
    enabled: true
  - id: analysis
    label: Analysis
    icon: 📈
    enabled: true
  - id: import_export
    label: Import/Export
    icon: 📥
    enabled: true
  - id: context_data
    label: Context Data
    icon: 🧩
    enabled: true
  presets:
  - id: all_elements
    name: 🔍 All Elements
    description: Show all risks, TPOs, and mitigations
    filters:
      risks:
        levels:
        - Business
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: true
      mitigations:
        enabled: true
  - id: risks_only
    name: 🎯 Risks Only
    description: Show only risks and their influences
    filters:
      risks:
        levels:
        - Business
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: false
      mitigations:
        enabled: false
  - id: business_focus
    name: ◆ Business Focus
    description: Focus on business risks only
    filters:
      risks:
        levels:
        - Business
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: true
      mitigations:
        enabled: false
  - id: operational_focus
    name: ● Operational Focus
    description: Focus on operational risks
    filters:
      risks:
        levels:
        - Operational
        categories:
        - Programme
        - Produit
        - Industriel
        - Supply Chain
        statuses:
        - Active
        - Contingent
      tpos:
        enabled: false
      mitigations:
        enabled: true
context_nodes:
  business_perimeter:
    label: Business Perimeter
    description: ''
    color: '#8E44AD'
    shape: box
    emoji: 🏢
    size: 35
    zone: upper
    border: double
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: Business unit or perimeter name
    - name: ebit_absolute
      type: float
      required: true
      default: null
      description: EBIT absolute value in EUR
    - name: ebit_margin
      type: float
      required: false
      default: null
      description: EBIT margin percentage
    - name: fcf_annual
      type: float
      required: false
      default: null
      description: Free cash flow annual in EUR
    - name: p_and_l_owner
      type: string
      required: false
      default: null
      description: P&L responsible owner
  scenario:
    label: Scenario
    description: ''
    color: '#F39C12'
    shape: hexagon
    emoji: 🎲
    size: 35
    zone: upper
    border: solid
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: Scenario name
    - name: annual_probability
      type: float
      required: true
      default: null
      description: Annual occurrence probability
    - name: ebit_impact_expected
      type: float
      required: true
      default: null
      description: Expected EBIT impact in EUR
    - name: recovery_days
      type: int
      required: false
      default: null
      description: Estimated recovery time in days
  entry_point:
    label: Entry Point
    description: ''
    color: '#E67E22'
    shape: box
    emoji: 🚪
    size: 30
    zone: lower
    border: solid
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: Entry point name
    - name: exploitability
      type: int
      required: false
      default: null
      description: Exploitability score (1-10)
  attacker:
    label: Attacker
    description: ''
    color: '#922B21'
    shape: box
    emoji: 👤
    size: 30
    zone: lower
    border: solid
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: Attacker profile name
    - name: capability_level
      type: int
      required: false
      default: null
      description: Capability level (1-10)
  tpo:
    label: Target Performance Objective
    description: Business objective impacted by risk
    color: '#f1c40f'
    shape: hexagon
    emoji: 🟡
    size: 35
    zone: upper
    border: solid
    properties:
    - name: name
      type: string
      required: true
      default: null
      description: TPO Name
    - name: cluster
      type: string
      required: false
      default: null
      description: Cluster grouping
context_edges:
  exploits:
    label: Exploits
    neo4j_type: EXPLOITS
    description: ''
    from_node: attacker
    to_node: entry_point
    color: '#C0392B'
    line_style: dashed
    bidirectional: false
    properties:
    - name: success_probability
      type: float
      required: false
      default: null
      description: Attack success probability
  exposes:
    label: Exposes
    neo4j_type: EXPOSES
    description: ''
    from_node: entry_point
    to_node: scenario
    color: '#E67E22'
    line_style: solid
    bidirectional: false
    properties: []
  impacts_tpo:
    label: Impacts TPO
    neo4j_type: IMPACTS_TPO
    description: ''
    from_node: risk
    to_node: tpo
    color: '#3498db'
    line_style: solid
    bidirectional: false
    properties: []
